<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Orders | D.O.T</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen p-8" x-data="adminOrders()">
  <div class="max-w-6xl mx-auto">
    <div class="flex justify-between items-center mb-8 border-b border-gray-700 pb-4">
      <h1 class="text-3xl font-bold">Orders Backend</h1>
      <button @click="fetchOrders()" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded text-sm font-bold transition">Refresh</button>
    </div>

    <template x-if="loading">
      <div class="text-center py-10">Loading orders...</div>
    </template>

    <template x-if="!loading && orders.length === 0">
      <div class="text-center py-10 text-gray-400 bg-gray-800 rounded">No orders found.</div>
    </template>

    <div class="space-y-6">
      <template x-for="order in orders" :key="order._id">
        <div class="bg-gray-800 p-6 rounded-lg shadow">
          <div class="flex justify-between items-start mb-4">
            <div>
              <p class="text-xs text-gray-400 mb-1" x-text="new Date(order.createdAt).toLocaleString()"></p>
              <h3 class="font-bold text-lg" x-text="order.shipping.firstName + ' ' + order.shipping.lastName"></h3>
              <p class="text-sm text-gray-300" x-text="order.customer.email"></p>
            </div>
            <div class="text-right">
              <span class="inline-block px-3 py-1 rounded bg-yellow-600/20 text-yellow-500 text-xs font-bold uppercase tracking-wider mb-2" x-text="order.status"></span>
              <p class="font-bold text-xl text-blue-400" x-text="'₹' + order.payment.total"></p>
            </div>
          </div>
          
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pt-4 border-t border-gray-700">
            <div>
              <h4 class="text-xs uppercase tracking-widest text-gray-400 mb-2 font-bold">Shipping Address</h4>
              <p class="text-sm text-gray-300" x-text="order.shipping.address + (order.shipping.apartment ? ', ' + order.shipping.apartment : '')"></p>
              <p class="text-sm text-gray-300" x-text="order.shipping.city + ', ' + order.shipping.state + ' ' + order.shipping.pinCode"></p>
              <p class="text-sm text-gray-300 mt-1" x-text="'Phone: ' + order.shipping.phone"></p>
            </div>
            <div>
              <h4 class="text-xs uppercase tracking-widest text-gray-400 mb-2 font-bold">Order Items</h4>
              <ul class="space-y-2">
                <template x-for="item in order.items">
                  <li class="flex justify-between text-sm">
                    <span x-text="item.name + ' (Size: ' + (item.size || 'L') + ')'" class="text-gray-300"></span>
                    <span x-text="'₹' + item.price" class="font-medium"></span>
                  </li>
                </template>
              </ul>
              <div class="mt-3 pt-3 border-t border-gray-700/50 flex justify-between text-xs text-gray-400">
                <span>Subtotal: <span x-text="'₹' + order.payment.subtotal"></span></span>
                <span>Shipping: <span x-text="order.payment.shippingFee === 0 ? 'Free' : '₹' + order.payment.shippingFee"></span></span>
              </div>
            </div>
          </div>
        </div>
      </template>
    </div>
  </div>

  <script>
    // In production, change this to your live Render URL (e.g. 'https://your-backend.onrender.com')
    const API_URL = 'http://localhost:3000';

    document.addEventListener('alpine:init', () => {
      Alpine.data('adminOrders', () => ({
        orders: [],
        loading: true,
        async init() {
          await this.fetchOrders();
        },
        async fetchOrders() {
          this.loading = true;
          try {
            const res = await fetch(API_URL + '/api/orders');
            if(res.ok) {
              this.orders = await res.json();
            } else {
              console.error('Failed to fetch');
            }
          } catch(e) {
            console.error(e);
          } finally {
            this.loading = false;
          }
        }
      }))
    })
  </script>
</body>
</html>
